respond_to_suggestion:
  name: Respond to suggestion
  description: Accept or dismiss a learning suggestion from Climate Advisor.
  fields:
    action:
      name: Action
      description: Whether to accept or dismiss the suggestion.
      required: true
      example: "accept"
      selector:
        select:
          options:
            - "accept"
            - "dismiss"
    suggestion_key:
      name: Suggestion key
      description: The key identifying the suggestion to respond to.
      required: true
      example: "bedtime_setback_override"
      selector:
        text:

force_reclassify:
  name: Force reclassify
  description: Force Climate Advisor to re-fetch forecast data and reclassify the day. Useful for debugging.

resend_briefing:
  name: Resend briefing
  description: Re-generate and resend the daily briefing notification, even if it was already sent today.

dump_diagnostics:
  name: Dump diagnostics
  description: >-
    Log a comprehensive diagnostic snapshot of Climate Advisor's internal state
    for troubleshooting. Output is logged at INFO level — check Home Assistant
    logs to view the result.

reset_learning_data:
  name: Reset learning data
  description: >-
    Reset some or all of Climate Advisor's learned data.
    Use after changing HVAC equipment, moving to a new location, or to start fresh.
  fields:
    scope:
      name: Scope
      description: >-
        What data to reset. "all" wipes everything. "thermal_model" clears HVAC session
        observations. "weather_bias" clears forecast accuracy records. "suggestions" allows
        previously dismissed suggestions to reappear.
      required: false
      default: "all"
      example: "thermal_model"
      selector:
        select:
          options:
            - "all"
            - "thermal_model"
            - "weather_bias"
            - "suggestions"

ai_activity_report:
  name: AI Activity Report
  description: >-
    Generate an AI-powered analysis of Climate Advisor's recent activity.
    Requires AI features to be enabled with a valid API key.
    Falls back to a simplified report if AI is unavailable.
  fields:
    hours:
      name: Hours
      description: How many hours of history to analyze (1-168).
      required: false
      default: 24
      example: 24
      selector:
        number:
          min: 1
          max: 168
    detail_level:
      name: Detail level
      description: Brief gives a summary only; full includes timeline, anomalies, and diagnostics.
      required: false
      default: "full"
      selector:
        select:
          options:
            - "brief"
            - "full"
